<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fffdf5" />
    <title>Pokédex – Explore Every Pokémon</title>
    <meta name="description" content="Browse, search, and filter Pokémon from every generation. Build teams and play Who's That Pokémon.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Pokédex – Explore Every Pokémon">
    <meta property="og:description" content="Browse, search, and filter Pokémon from every generation. Build teams and play Who's That Pokémon.">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Pokédex",
      "url": "/",
      "description": "Browse, search, and filter Pokémon from every generation.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Pokédex",
      "url": "/"
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
